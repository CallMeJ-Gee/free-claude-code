{% extends "base.html" %}

{% block title %}Providers{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">
    <h2 class="text-2xl font-bold mb-6">Providers</h2>

    <div class="mb-6">
        <button hx-get="/admin/providers/form"
                hx-target="#main-content"
                hx-push-url="true"
                class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
            Add Provider
        </button>
        <button onclick="loadProviders()"
                class="ml-2 bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">
            Refresh
        </button>
    </div>

    <div id="provider-list" class="space-y-4">
        <div class="flex items-center justify-center py-8">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
            <span class="ml-3 text-gray-500">Loading providers...</span>
        </div>
    </div>
</div>

<script>
    // Load providers on page load
    function loadProviders() {
        console.log('Loading providers...');
        authenticatedFetch('/admin/providers/list')
            .then(response => {
                console.log('Providers response:', response.status);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Providers data:', data);
                const container = document.getElementById('provider-list');
                if (data.providers && data.providers.length > 0) {
                    container.innerHTML = data.providers.map(provider => `
                        <div class="bg-white border border-gray-200 rounded-lg p-4 shadow-sm">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="font-medium text-lg">${provider.id}</div>
                                    <div class="text-sm text-gray-500 mt-1">
                                        ${provider.models_count || 0} models configured
                                    </div>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="testProvider('${provider.id}')"
                                            class="bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-sm">
                                        Test
                                    </button>
                                    <button onclick="deleteProvider('${provider.id}')"
                                            class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm">
                                        Delete
                                    </button>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="text-gray-500">No providers configured. Add a provider to get started.</div>';
                }
            })
            .catch(error => {
                console.error('Failed to load providers:', error);
                document.getElementById('provider-list').innerHTML = '<div class="text-red-500">Failed to load providers: ' + error.message + '</div>';
            });
    }

    function testProvider(providerId) {
        console.log('Testing provider:', providerId);
        authenticatedFetch(`/admin/providers/${providerId}/test`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                alert(data.status === 'ok' ? 'Connection successful!' : `Error: ${data.message}`);
                // Clear cache and reload providers after test
                clearCache();
                loadProviders();
            })
            .catch(error => {
                console.error('Failed to test provider:', error);
                alert('Failed to test provider');
            });
    }

    function deleteProvider(providerId) {
        if (!confirm(`Are you sure you want to delete the provider "${providerId}"? This will clear all configuration for this provider.`)) {
            return;
        }

        console.log('Deleting provider:', providerId);
        authenticatedFetch(`/admin/providers/${providerId}`, { method: 'DELETE' })
            .then(response => {
                if (!response.ok) {
                    return response.json().then(data => {
                        throw new Error(data.detail || 'Failed to delete provider');
                    });
                }
                return response.json();
            })
            .then(data => {
                alert('Provider deleted successfully!');
                // Clear cache and reload providers
                clearCache();
                loadProviders();
            })
            .catch(error => {
                console.error('Failed to delete provider:', error);
                alert('Failed to delete provider: ' + error.message);
            });
    }

    // Execute immediately when script loads (for HTMX navigation)
    loadProviders();
</script>
{% endblock %}

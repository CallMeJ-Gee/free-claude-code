{% extends "base.html" %}

{% block title %}System{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto">
    <h2 class="text-2xl font-bold mb-6">System</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- System Status -->
        <div class="bg-white border border-gray-200 rounded-lg p-6">
            <h3 class="text-lg font-semibold mb-4">Status</h3>
            <div class="space-y-2">
                <div class="flex justify-between">
                    <span class="text-gray-600">Status</span>
                    <span class="font-medium text-green-600">Running</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">Uptime</span>
                    <span class="font-medium text-blue-500" id="uptime">Loading...</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">Version</span>
                    <span class="font-medium">2.0.0</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">Python</span>
                    <span class="font-medium">3.14</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">Providers</span>
                    <span class="font-medium text-blue-500" id="provider-count">Loading...</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-gray-600">Models</span>
                    <span class="font-medium text-blue-500" id="model-count">Loading...</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="bg-white border border-gray-200 rounded-lg p-6">
            <h3 class="text-lg font-semibold mb-4">Actions</h3>
            <div class="space-y-3">
                <button onclick="clearModelCache()"
                        class="w-full bg-yellow-500 hover:bg-yellow-600 text-white px-4 py-2 rounded">
                    Clear Model Cache
                </button>
                <button onclick="viewConfig()"
                        class="w-full bg-gray-500 hover:bg-gray-600 text-white px-4 py-2 rounded">
                    View Config
                </button>
            </div>
        </div>
    </div>

    <div id="config-display" class="mt-6 bg-gray-900 text-gray-300 font-mono text-sm p-4 rounded-lg hidden">
    </div>
</div>

<script>
    function loadSystemStatus() {
        console.log('Loading system status...');
        authenticatedFetch('/admin/system/status')
            .then(response => {
                console.log('System status response:', response.status);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('System status data:', data);
                document.getElementById('uptime').textContent = data.uptime || 'N/A';
                document.getElementById('provider-count').textContent = data.total_providers || 0;
                document.getElementById('model-count').textContent = data.total_models || 0;
            })
            .catch(error => {
                console.error('Failed to load system status:', error);
                document.getElementById('uptime').textContent = 'Error';
                document.getElementById('provider-count').textContent = 'Error';
                document.getElementById('model-count').textContent = 'Error';
            });
    }

    function clearModelCache() {
        if (confirm('Are you sure you want to clear the model cache?')) {
            authenticatedFetch('/admin/system/clear-cache', { method: 'POST' })
                .then(response => {
                    if (!response.ok) {
                        return response.json().then(data => {
                            throw new Error(data.detail || 'Failed to clear cache');
                        });
                    }
                    return response.json();
                })
                .then(data => {
                    alert(data.message || 'Cache cleared');
                    // Clear client-side cache and reload
                    clearCache();
                    loadSystemStatus();
                })
                .catch(error => {
                    console.error('Failed to clear cache:', error);
                    alert('Failed to clear cache: ' + error.message);
                });
        }
    }

    function viewConfig() {
        authenticatedFetch('/admin/system/config')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                const display = document.getElementById('config-display');
                display.classList.remove('hidden');
                display.textContent = JSON.stringify(data, null, 2);
            })
            .catch(error => {
                console.error('Failed to load config:', error);
                alert('Failed to load config: ' + error.message);
            });
    }

    // Execute immediately when script loads (for HTMX navigation)
    loadSystemStatus();
</script>
{% endblock %}
